{# Sidebar navigation partial — dùng chung cho desktop và offcanvas mobile #}
<nav class="app-sidebar-nav">
    {% for section in sidebar_sections %}
    {% if section.label %}
    <div class="nav-section">{{ section.label }}</div>
    {% endif %}
    <ul class="nav flex-column mb-1">
        {% for item in section.links %}
        <li class="nav-item">
            <a class="nav-link {% if item.endpoint and request.endpoint == item.endpoint %}active{% endif %}{% if item.disabled %} disabled{% endif %}"
               href="{{ item.url }}"
               {% if item.disabled %}aria-disabled="true" tabindex="-1"{% endif %}>
                <i class="bi bi-{{ item.icon }}"></i>
                <span>{{ item.label }}</span>
            </a>
        </li>
        {% endfor %}
    </ul>
    {% endfor %}
</nav>
