{% extends "banker_base.html" %}

{% block title %}Tạo khách hàng — Banking Transaction Management{% endblock %}

{% block page_header %}
<div class="app-page-header">
    <h1>Tạo khách hàng</h1>
    <p class="page-subtitle">UC-BANKER-03 — Đăng ký khách hàng mới</p>
</div>
{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card app-card">
            <div class="card-body p-4">
                <form method="POST" action="{{ url_for('banker.customers_new') }}" novalidate>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="full_name" class="form-label">FullName <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="full_name" name="full_name"
                                   value="{{ form_data.full_name }}" placeholder="Họ và tên">
                        </div>
                        <div class="col-md-6">
                            <label for="email" class="form-label">Email <span class="text-danger">*</span></label>
                            <input type="email" class="form-control" id="email" name="email"
                                   value="{{ form_data.email }}" placeholder="email@example.com">
                        </div>
                        <div class="col-md-6">
                            <label for="phone_number" class="form-label">PhoneNumber <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="phone_number" name="phone_number"
                                   value="{{ form_data.phone_number }}" placeholder="0901234567">
                        </div>
                        <div class="col-md-6">
                            <label for="birth_day" class="form-label">BirthDay</label>
                            <input type="date" class="form-control" id="birth_day" name="birth_day"
                                   value="{{ form_data.birth_day }}">
                        </div>
                        <div class="col-12">
                            <label for="address" class="form-label">Address</label>
                            <input type="text" class="form-control" id="address" name="address"
                                   value="{{ form_data.address }}" placeholder="Địa chỉ liên hệ">
                        </div>
                        <div class="col-md-6">
                            <label for="username" class="form-label">Username <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="username" name="username"
                                   value="{{ form_data.username }}" placeholder="Tên đăng nhập">
                        </div>
                        <div class="col-md-6">
                            <label for="password" class="form-label">Password <span class="text-danger">*</span></label>
                            <input type="password" class="form-control" id="password" name="password"
                                   placeholder="Mật khẩu">
                        </div>
                    </div>
                    <div class="d-flex gap-2 mt-4">
                        <button type="submit" class="btn btn-success">
                            <i class="bi bi-check-lg me-1"></i>Tạo khách hàng
                        </button>
                        <a href="{{ url_for('banker.customers') }}" class="btn btn-outline-secondary">
                            <i class="bi bi-arrow-left me-1"></i>Quay lại
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
